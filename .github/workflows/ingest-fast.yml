name: ingest-fast
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: ingesta binance (spot + futuros)
        run: |
          curl -fsS -m 90 -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SITE_URL }}/api/ingest/binance"
      - name: ingesta hyperliquid
        if: always()
        run: |
          curl -fsS -m 60 -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SITE_URL }}/api/ingest/hyperliquid"
