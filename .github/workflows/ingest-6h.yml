name: ingest-6h
on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: ingesta liderazgo por activo + rankings
        run: |
          curl -fsS -m 150 -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SITE_URL }}/api/ingest/leadership"
