name: ingest-hourly
on:
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: ingesta coingecko
        run: |
          curl -fsS -m 320 -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SITE_URL }}/api/ingest/coingecko"
      - name: ingesta bnb chain (defillama + artemis)
        if: always()
        run: |
          curl -fsS -m 150 -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SITE_URL }}/api/ingest/bnb"
      - name: ingesta noticias (anuncios Binance + impacto, incremental)
        if: always()
        run: |
          curl -fsS -m 300 -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SITE_URL }}/api/ingest/news?pages=2"
      - name: ingesta pulse (fear&greed + movers + funding + duelo + mercado)
        if: always()
        run: |
          curl -fsS -m 120 -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SITE_URL }}/api/ingest/pulse"
      - name: ingesta reservas (proof-of-reserves DefiLlama)
        if: always()
        run: |
          curl -fsS -m 80 -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SITE_URL }}/api/ingest/reserves"
      - name: ingesta stables (stablecoins por cadena)
        if: always()
        run: |
          curl -fsS -m 80 -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SITE_URL }}/api/ingest/stables"
